name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -p 1 -short ./... -v

      - name: Build Docker image (verification only)
        run: touch .env && docker build -t smart-shopper-agent:test .

